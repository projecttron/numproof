name: ci
on: [push, pull_request]

jobs:
  recheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install (with offline re-checker extra)
        run: pip install -e ".[verify]"
      - name: import check
        run: python -c "import numproof; from numproof import NumProof; print('import ok')"
      - name: the shipped example receipt must re-check OK
        run: numproof-verify examples/receipt_example.json
